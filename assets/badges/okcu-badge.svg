<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="ok-bg" cx="50%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#252933"/>
      <stop offset="100%" stop-color="#0F1115"/>
    </radialGradient>
    <linearGradient id="ok-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C06A"/>
      <stop offset="50%" stop-color="#C89B3C"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
    <linearGradient id="ok-wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B98A52"/>
      <stop offset="100%" stop-color="#6E4A26"/>
    </linearGradient>
  </defs>

  <circle cx="60" cy="60" r="58" fill="url(#ok-bg)" stroke="url(#ok-gold)" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#C89B3C" stroke-width="1" stroke-dasharray="2 4" opacity="0.5"/>

  <!-- yay (kavisli) -->
  <path d="M46 32c-14 10-14 46 0 56" fill="none" stroke="url(#ok-wood)" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M47 34c-3 3-5 7-6 12M47 86c-3-3-5-7-6-12" fill="none" stroke="#3E2A13" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M46 32c1.4 8 1.4 16 0 24M46 60c1.4 8 1.4 16 0 24" fill="none" stroke="url(#ok-gold)" stroke-width="1.2" opacity="0.5"/>

  <!-- kiriş -->
  <path d="M46 32 L46 88" stroke="#F5EBD7" stroke-width="1.3" opacity="0.85"/>

  <!-- ok -->
  <path d="M46 60 L88 60" stroke="#5C6672" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M88 60 L80 55 L80 65 Z" fill="url(#ok-gold)" stroke="#8A661F" stroke-width="1"/>
  <path d="M46 60 l-8 -4 M46 60 l-8 4" stroke="#DCE3EA" stroke-width="1.6" stroke-linecap="round"/>

  <!-- ok kılıfı (sadak) yan -->
  <path d="M28 78c3-8 3-16 0-24" fill="none" stroke="url(#ok-wood)" stroke-width="4.4" stroke-linecap="round" opacity="0.55"/>

  <path d="M60 90a7 7 0 1 0 0.1 0" fill="none" stroke="#F5EBD7" stroke-width="1.5" stroke-dasharray="13 100" stroke-linecap="round" transform="rotate(20 60 90)" opacity="0.85"/>

  <text x="60" y="107" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C89B3C" letter-spacing="2">OKÇU</text>
</svg>
